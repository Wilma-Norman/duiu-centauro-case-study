name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sallve-case-study/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sallve-case-study

      - name: Build Svelte app
        run: npm run build
        working-directory: sallve-case-study

      - name: Assemble site
        run: |
          mkdir -p _site/sallve-app
          cp index.html _site/
          cp centauro-case-study.html _site/
          cp sallve-case-study.html _site/
          cp "Frame 10.png" _site/
          cp "Group 254.png" _site/
          cp "LOGO R sub.png" _site/
          cp -r sallve-case-study/dist/* _site/sallve-app/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
